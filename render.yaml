services:
  - type: web
    name: autolux
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: autolux-disk
      mountPath: /opt/render/project/src/persist
      sizeGB: 1
    envVars:
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/persist/data
      - key: STORAGE_DIR
        value: /opt/render/project/src/persist/storage
